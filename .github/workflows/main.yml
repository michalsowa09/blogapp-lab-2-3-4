name: Django CI/CD Pipeline

on:
  push:
    branches: [ "main", "feature/ci-cd-deployment" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # KROK Z OPTYMALIZACJĄ:
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Linter (flake8)
      run: |
        # Sprawdzamy błędy składniowe i logiczne
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run Unit Tests
      run: |
        python manage.py test

  deploy:
    needs: test # Tylko jeśli testy przejdą na zielono!
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Tylko przy pushu do głównej gałęzi
    steps:
      - name: Trigger Render Deploy
        run: curl -s ${{ secrets.RENDER_DEPLOY_HOOK }}

  verify:
      needs: deploy
      runs-on: ubuntu-latest
      steps:
        - name: Wait for deployment
          run: sleep 60 # Czekam chwilę, aż serwer się odświeży
        - name: Sanity Check (Status 200 OK)
          run: |
            
            curl -f https://isi-django-hub.onrender.com/ || exit 1